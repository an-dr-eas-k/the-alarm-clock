[loggers]
keys=root, observer, librespot_ev, apscheduler, tac, tac_os, tac_sound_device, tac_api,
  tac_display, utils_drawing, tac_controls, tac_domain, tac_mcp, 
  tac_mcp_buttons, tac_mcp_rotary_encoder, tac_keyboard_buttons, tac_event_bus, tac_mode_coordinator, tac_audio, 
  tac_hardware_input_handler, tac_scheduler

[handlers]
keys=consoleHandler,sysHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=ERROR
handlers=sysHandler

[logger_tac]
level=INFO
handlers=consoleHandler
qualname=tac

[logger_tac_event_bus]
level=INFO
handlers=consoleHandler
qualname=tac.event_bus
propagate=0

[logger_tac_api]
level=INFO
handlers=consoleHandler
qualname=tac.api
propagate=0

[logger_tac_controls]
level=INFO
handlers=consoleHandler
qualname=tac.controls
propagate=0

[logger_tac_mode_coordinator]
level=INFO
handlers=consoleHandler
qualname=tac.mode_coordinator
propagate=0

[logger_tac_hardware_input_handler]
level=INFO
handlers=consoleHandler
qualname=tac.hardware_input_handler
propagate=0

[logger_tac_domain]
level=INFO
handlers=consoleHandler
qualname=tac.domain
propagate=0

[logger_tac_display]
level=INFO
handlers=consoleHandler
qualname=tac.display
propagate=0

[logger_utils_drawing]
level=INFO
handlers=consoleHandler
qualname=utils.drawing
propagate=0

[logger_tac_audio]
level=INFO
handlers=consoleHandler
qualname=tac.audio
propagate=0

[logger_tac_os]
level=INFO
handlers=consoleHandler
qualname=tac.os
propagate=0

[logger_tac_sound_device]
level=INFO
handlers=consoleHandler
qualname=tac.sound_device
propagate=0

[logger_librespot_ev]
level=DEBUG
handlers=consoleHandler
qualname=librespot_ev
propagate=0

[logger_observer]
level=WARNING
handlers=consoleHandler
qualname=tac.observer
propagate=0

[logger_apscheduler]
level=WARNING
handlers=consoleHandler
qualname=apscheduler.executors.default

[logger_tac_mcp]
level=INFO
handlers=consoleHandler
qualname=tac.mcp
propagate=0

[logger_tac_mcp_buttons]
level=INFO
handlers=consoleHandler
qualname=tac.mcp_buttons
propagate=0

[logger_tac_mcp_rotary_encoder]
level=INFO
handlers=consoleHandler
qualname=tac.mcp_rotary_encoder
propagate=0

[logger_tac_keyboard_buttons]
level=INFO
handlers=consoleHandler
qualname=tac.keyboard_buttons
propagate=0

[logger_tac_scheduler]
level=INFO
handlers=consoleHandler
qualname=tac.scheduler
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_sysHandler]
class=logging.handlers.SysLogHandler
level=ERROR
formatter=simpleFormatter
args=('/dev/log',)

[formatter_simpleFormatter]
format=%(name)s [%(levelname)s]: %(message)s
